<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입장권 바코드 | (주)더블에이치컴퍼니</title>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<style>
  :root{
    --navy:#0e2a47;--blue:#1d6fe0;--sky:#47b6e8;--coral:#ff6b5c;--amber:#ffb648;
    --cream:#f5f8fc;--ink:#16202e;--gray:#64748b;--line:#e2e9f2;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 16px}
  .card{background:#fff;border-radius:18px;box-shadow:0 8px 32px rgba(14,42,71,.09);max-width:420px;width:100%;overflow:hidden}
  .card-head{background:linear-gradient(135deg,var(--navy),var(--blue));padding:22px 24px;color:#fff}
  .card-head .brand{font-size:11px;letter-spacing:.14em;text-transform:uppercase;opacity:.75;margin-bottom:6px}
  .card-head .venue{font-size:20px;font-weight:800;letter-spacing:-.02em}
  .card-head .ticket{font-size:13px;opacity:.85;margin-top:2px}
  .card-body{padding:26px 24px 24px}
  .row{display:flex;justify-content:space-between;font-size:13px;color:var(--gray);padding:7px 0;border-bottom:1px solid var(--line)}
  .row:last-of-type{border-bottom:none;margin-bottom:18px}
  .row span:last-child{color:var(--ink);font-weight:600}
  .barcode-wrap{background:#fafbfd;border:1px solid var(--line);border-radius:12px;padding:18px 10px;text-align:center;overflow-x:auto}
  .barcode-wrap svg{max-width:100%}
  .pin-fallback{font-size:20px;font-weight:800;letter-spacing:.08em;color:var(--ink);padding:20px 0}
  .notice{margin-top:16px;background:#FFF6E8;border:1px solid #FFE3B0;border-radius:10px;padding:12px 14px;font-size:12.5px;color:#8a5a00;line-height:1.6}
  .state{padding:60px 24px;text-align:center;color:var(--gray);font-size:14px;line-height:1.8}
  .state strong{display:block;color:var(--ink);font-size:16px;margin-bottom:6px}
  .foot{margin-top:24px;text-align:center;font-size:11.5px;color:var(--gray);line-height:1.8}
  .foot a{color:var(--blue);text-decoration:none}
</style>
</head>
<body>

<div class="card" id="card">
  <div class="state" id="state">불러오는 중입니다...</div>
</div>

<div class="foot">
  (주)더블에이치컴퍼니 · 사업자등록번호 420-88-03868<br>
  문의 <a href="tel:031-339-2999">031-339-2999</a> · <a href="products.html">홈페이지 바로가기</a>
</div>

<script>
const SB_URL = 'https://xoupacfmkhuuvxebgfqi.supabase.co';
const SB_KEY = 'sb_publishable_46KQebvC7_S-_JDramvDmA_jk9aSeVc';

function fmtDate(s){
  if(!s) return '—';
  const d = new Date(s);
  if (isNaN(d)) return s;
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

async function loadTicket() {
  const params = new URLSearchParams(location.search);
  const pin = (params.get('pin') || '').trim();
  const card = document.getElementById('card');

  if (!pin) {
    card.innerHTML = `<div class="state"><strong>바코드 정보를 찾을 수 없습니다</strong>링크가 올바른지 확인해주세요.<br>문제가 계속되면 031-339-2999로 문의해주세요.</div>`;
    return;
  }

  try {
    const res = await fetch(`${SB_URL}/rest/v1/pin_inventory?select=venue_name,ticket_name,pin_number,valid_from,valid_to,buyer_name,status&pin_number=eq.${encodeURIComponent(pin)}&limit=1`, {
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
    });
    const rows = await res.json();
    const p = Array.isArray(rows) ? rows[0] : null;

    if (!p) {
      card.innerHTML = `<div class="state"><strong>바코드 정보를 찾을 수 없습니다</strong>링크가 올바른지 확인해주세요.<br>문제가 계속되면 031-339-2999로 문의해주세요.</div>`;
      return;
    }

    card.innerHTML = `
      <div class="card-head">
        <div class="brand">HHCOMPANY 입장권</div>
        <div class="venue">${p.venue_name || ''}</div>
        <div class="ticket">${p.ticket_name || ''}</div>
      </div>
      <div class="card-body">
        ${p.buyer_name ? `<div class="row"><span>구매자</span><span>${p.buyer_name}</span></div>` : ''}
        <div class="row"><span>유효기간</span><span>${fmtDate(p.valid_from)} ~ ${fmtDate(p.valid_to)}</span></div>
        <div class="barcode-wrap">
          <svg id="barcode-svg"></svg>
        </div>
        <div class="notice">현장 입장 시 이 화면의 바코드를 제시해주세요. 화면 캡처본도 사용 가능합니다.</div>
      </div>`;

    try {
      JsBarcode('#barcode-svg', p.pin_number, { format:'CODE128', width:2.4, height:90, displayValue:true, fontSize:16, margin:8 });
    } catch(e) {
      document.querySelector('.barcode-wrap').innerHTML = `<div class="pin-fallback">${p.pin_number}</div>`;
    }
  } catch (e) {
    card.innerHTML = `<div class="state"><strong>불러오지 못했습니다</strong>잠시 후 다시 시도해주세요.<br>031-339-2999로 문의해주세요.</div>`;
  }
}

loadTicket();
</script>
</body>
</html>
